<div class="favorites-wrapper">
  <div class="favorites-header">
    <h3>Favorite Locations</h3>
  </div>

  <div class="favorites-list">
    @for (city of weatherService.favorites(); track city.latitude + ',' + city.longitude) {
      <div 
        (click)="selectCity(city)" 
        [class.active]="weatherService.currentCity()?.latitude === city.latitude && weatherService.currentCity()?.longitude === city.longitude"
        class="favorite-card"
      >
        <div class="card-info">
          <span class="city-name">{{ city.name }}</span>
          <span class="country-name">{{ city.country }}</span>
        </div>
        
        <button 
          (click)="removeFavorite($event, city)" 
          class="remove-btn" 
          title="Remove from favorites"
        >
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="trash-icon">
            <polyline points="3 6 5 6 21 6"></polyline>
            <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
            <line x1="10" y1="11" x2="10" y2="17"></line>
            <line x1="14" y1="11" x2="14" y2="17"></line>
          </svg>
        </button>
      </div>
    } @empty {
      <div class="empty-state">
        <p>No favorite cities saved yet. Search and click the star to save!</p>
      </div>
    }
  </div>
</div>
