<div class="search-container">
  <div class="search-input-wrapper">
    <svg class="search-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="11" cy="11" r="8"></circle>
      <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
    </svg>
    
    <input 
      type="text" 
      [value]="query()" 
      (input)="onInput($event)"
      (focus)="suggestions().length > 0 && showSuggestions.set(true)"
      placeholder="Search for cities..."
      class="search-input"
    />

    @if (isSearching()) {
      <div class="spinner-small"></div>
    }
  </div>

  @if (showSuggestions()) {
    <ul class="suggestions-list">
      @for (city of suggestions(); track city.latitude + ',' + city.longitude) {
        <li (click)="selectCity(city)" class="suggestion-item">
          <span class="city-name">{{ city.name }}</span>
          <span class="city-details">
            @if (city.admin1) {
              {{ city.admin1 }}, 
            }
            {{ city.country }}
          </span>
          @if (city.countryCode) {
            <span class="country-flag-badge">{{ city.countryCode }}</span>
          }
        </li>
      }
    </ul>
  }
</div>
